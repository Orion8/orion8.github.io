<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Countdown Timer</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0b0b12;
      color: #d0d0e8;
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100%; }

    .viewport { width: 100vw; height: 100vh; overflow: hidden; }

    .slides {
      display: flex;
      width: 200vw;
      height: 100%;
      will-change: transform;
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .slides.show-timer { transform: translateX(-50%); }

    .slide {
      width: 100vw;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      flex-shrink: 0;
    }

    /* hide number input spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; appearance: textfield; }

    @keyframes flicker {
      0%, 100% { opacity: 1;    }
      20%      { opacity: 0.60; }
      50%      { opacity: 0.88; }
      75%      { opacity: 0.52; }
    }
    .flickering { animation: flicker 0.75s ease-in-out infinite; }

    button { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ─── constants ────────────────────────────────────────── */
const PRESETS = [
  { key:'10s',  label:'10s',  seconds:10   },
  { key:'20s',  label:'20s',  seconds:20   },
  { key:'30s',  label:'30s',  seconds:30   },
  { key:'1m',   label:'1m',   seconds:60   },
  { key:'2m',   label:'2m',   seconds:120  },
  { key:'3m',   label:'3m',   seconds:180  },
  { key:'5m',   label:'5m',   seconds:300  },
  { key:'10m',  label:'10m',  seconds:600  },
  { key:'15m',  label:'15m',  seconds:900  },
  { key:'25m',  label:'25m',  seconds:1500 },
  { key:'45m',  label:'45m',  seconds:2700 },
  { key:'60m',  label:'60m',  seconds:3600 },
];

const TUBE_W = 280;  // serpentine panel width
const TUBE_H = 340;  // serpentine panel height
const TUBE_PAD = 8;  // top/bottom padding inside panel
const TUBE_GAP = 3;  // visual gap between adjacent tube rows

/* ─── helpers ──────────────────────────────────────────── */
function pad2(n) { return String(Math.max(0, Math.floor(n))).padStart(2, '0'); }
function fmt(sec) { return `${pad2(sec / 60)}:${pad2(sec % 60)}`; }

/* ── serpentine tube helpers ──────────────────────── */
// Target lava speed in px/s. numRows is computed so that
// totalPathLength / totalSeconds ≈ LAVA_SPEED.
// Short timers use MIN_ROWS (minimum 3 rows keeps the tube visible)
// and run faster; very long timers hit MAX_ROWS and slow slightly.
const LAVA_SPEED = 6; // px/s
const MIN_ROWS   = 3;
const MAX_ROWS   = 30;

function computeNumRows(seconds) {
  const target = LAVA_SPEED * seconds;
  for (let N = MIN_ROWS; N <= MAX_ROWS; N++) {
    const r        = (TUBE_H - 2 * TUBE_PAD) / (2 * N);
    const horizLen = TUBE_W - 4 * r;
    if (horizLen <= 0) continue;
    const len = N * horizLen + (N - 1) * Math.PI * r;
    if (len >= target) return N;
  }
  return MAX_ROWS;
}

function buildTubePath(numRows) {
  const r           = (TUBE_H - 2 * TUBE_PAD) / (2 * numRows);
  const rowSpacing  = 2 * r;
  const hLeft       = 2 * r;                  // horiz segment left x
  const hRight      = TUBE_W - 2 * r;         // horiz segment right x
  const cy = i => TUBE_PAD + r + i * rowSpacing;

  let d = `M ${hLeft},${cy(0)}`;
  for (let i = 0; i < numRows; i++) {
    if (i % 2 === 0) {
      d += ` L ${hRight},${cy(i)}`;
      if (i < numRows - 1)
        d += ` A ${r} ${r} 0 0 1 ${hRight} ${cy(i + 1)}`;
    } else {
      d += ` L ${hLeft},${cy(i)}`;
      if (i < numRows - 1)
        d += ` A ${r} ${r} 0 0 0 ${hLeft} ${cy(i + 1)}`;
    }
  }

  const horizLen   = hRight - hLeft;
  const totalLen   = numRows * horizLen + (numRows - 1) * Math.PI * r;
  const tubeThick  = rowSpacing - TUBE_GAP;
  return { d, totalLen, tubeThick, r };
}

function playAlarm() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [660, 880, 1100].forEach((hz, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = hz;
      const t = ctx.currentTime + i * 0.33;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.42, t + 0.05);
      gain.gain.linearRampToValueAtTime(0,    t + 0.28);
      osc.start(t); osc.stop(t + 0.36);
    });
  } catch (_) {}
}

/* ─── SerpentineTube ───────────────────────────────────── */
function SerpentineTube({ pct, totalSeconds }) {
  const numRows = useMemo(() => computeNumRows(totalSeconds), [totalSeconds]);
  const { d, totalLen, tubeThick } = useMemo(() => buildTubePath(numRows), [numRows]);

  const dashOffset = totalLen * (1 - pct / 100);
  const hasLava    = pct > 0.05;
  const glowSize   = Math.min(12, tubeThick * 0.18);

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:10 }}>
      <svg
        width={TUBE_W} height={TUBE_H}
        style={{ overflow:'visible', filter: hasLava ? `drop-shadow(0 0 ${glowSize}px #FF7700)` : 'none' }}
      >
        <defs>
          <linearGradient id="lavaGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stopColor="#FF4400"/>
            <stop offset="50%"  stopColor="#FF8C00"/>
            <stop offset="100%" stopColor="#FFD700"/>
          </linearGradient>
        </defs>

        {/* dark tube border */}
        <path d={d} fill="none" stroke="#080812"
          strokeWidth={tubeThick + 7} strokeLinecap="round"/>

        {/* empty tube interior */}
        <path d={d} fill="none" stroke="#0f0f1e"
          strokeWidth={tubeThick} strokeLinecap="round"/>

        {/* glass highlight line (top quarter) */}
        <path d={d} fill="none" stroke="rgba(255,255,255,0.055)"
          strokeWidth={tubeThick * 0.22} strokeLinecap="round"/>

        {/* lava — outer glow layer */}
        {hasLava && (
          <path d={d} fill="none" stroke="#FF5500"
            strokeWidth={tubeThick * 0.82} strokeLinecap="round"
            strokeDasharray={totalLen} strokeDashoffset={dashOffset}
            opacity={0.55}/>
        )}

        {/* lava — main fill */}
        {hasLava && (
          <path d={d} fill="none" stroke="url(#lavaGrad)"
            strokeWidth={tubeThick * 0.65} strokeLinecap="round"
            strokeDasharray={totalLen} strokeDashoffset={dashOffset}/>
        )}

        {/* lava — bright yellow core */}
        {hasLava && (
          <path d={d} fill="none" stroke="#FFE566"
            strokeWidth={Math.max(1.5, tubeThick * 0.25)} strokeLinecap="round"
            strokeDasharray={totalLen} strokeDashoffset={dashOffset}
            opacity={0.85}/>
        )}
      </svg>

      <div style={{ fontSize:12, color:'#3a3a5a', letterSpacing:1, fontVariantNumeric:'tabular-nums' }}>
        {Math.round(pct)}% elapsed
      </div>
    </div>
  );
}

/* ─── TimerScreen ──────────────────────────────────────── */
function TimerScreen({ preset, onBack }) {
  const total = preset.seconds * 1000;

  const [remMs,   setRemMs]   = useState(total);
  const [running, setRunning] = useState(false);
  const [done,    setDone]    = useState(false);

  const ivRef    = useRef(null);
  const t0Ref    = useRef(null);
  const pauseRef = useRef(total);   // ms remaining at last pause

  const elapsed = total - remMs;
  const pct     = (elapsed / total) * 100;
  const remSec  = Math.ceil(remMs  / 1000);
  const lapSec  = Math.floor(elapsed / 1000);
  const urgent  = pct >= 90;
  const warning = pct >= 75;

  const stopInterval = () => { clearInterval(ivRef.current); ivRef.current = null; };

  const startTimer = () => {
    t0Ref.current = Date.now();
    setRunning(true);
    ivRef.current = setInterval(() => {
      const went = Date.now() - t0Ref.current;
      const rem  = pauseRef.current - went;
      if (rem <= 0) {
        setRemMs(0); setRunning(false); setDone(true);
        stopInterval(); playAlarm();
      } else {
        setRemMs(rem);
      }
    }, 50);
  };

  const pause = () => {
    stopInterval();
    pauseRef.current = remMs;
    setRunning(false);
  };

  const reset = () => {
    stopInterval();
    setRunning(false); setDone(false);
    setRemMs(total); pauseRef.current = total;
  };

  // auto-start on mount
  useEffect(() => {
    startTimer();
    return () => stopInterval();
  }, []);

  const remColor = done    ? '#22c55e'
                 : urgent  ? '#f59e0b'
                 : warning ? '#ef4444'
                 :           '#e8e8ff';

  return (
    <div style={{
      width:'100vw', minHeight:'100vh', background:'#0b0b12',
      display:'flex', flexDirection:'column', padding:'20px 28px 28px',
    }}>

      {/* back button */}
      <button
        onClick={onBack}
        style={{
          background:'none', border:'none', color:'#3a3a5a',
          fontSize:13, cursor:'pointer',
          display:'flex', alignItems:'center', gap:5,
          padding:'6px 0', alignSelf:'flex-start', transition:'color 0.15s',
        }}
        onMouseEnter={e => e.currentTarget.style.color='#7777aa'}
        onMouseLeave={e => e.currentTarget.style.color='#3a3a5a'}
      >
        ← back
      </button>

      {/* three-column layout */}
      <div style={{
        flex:1, display:'flex', alignItems:'center',
        justifyContent:'center', gap:36, padding:'12px 0',
      }}>

        {/* ── left column: elapsed / remaining ── */}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:4, minWidth:130 }}>

          {/* elapsed */}
          <div>
            <div style={{ fontSize:10, color:'#22224a', textTransform:'uppercase', letterSpacing:1.8, textAlign:'right', marginBottom:5 }}>
              Elapsed
            </div>
            <div style={{
              fontSize:40, fontWeight:600, color:'#1e1e38',
              fontVariantNumeric:'tabular-nums', letterSpacing:-1,
            }}>
              {fmt(lapSec)}
            </div>
          </div>

          {/* divider */}
          <div style={{ width:'100%', height:1, background:'#141428', margin:'10px 0' }}/>

          {/* remaining */}
          <div>
            <div style={{ fontSize:10, color:'#55556a', textTransform:'uppercase', letterSpacing:1.8, textAlign:'right', marginBottom:5 }}>
              Remaining
            </div>
            <div
              className={urgent && !done ? 'flickering' : ''}
              style={{
                fontSize:40, fontWeight:700, color:remColor,
                fontVariantNumeric:'tabular-nums', letterSpacing:-1,
                transition:'color 0.5s ease',
              }}
            >
              {fmt(remSec)}
            </div>
          </div>
        </div>

        {/* ── center: serpentine tube ── */}
        <SerpentineTube pct={Math.min(pct, 100)} totalSeconds={preset.seconds} />

        {/* ── right column: controls ── */}
        <div style={{ display:'flex', flexDirection:'column', gap:14, minWidth:130 }}>

          {/* preset label */}
          <div style={{ fontSize:13, color:'#44445a', fontWeight:500, letterSpacing:0.3 }}>
            {preset.label}
          </div>

          {/* primary action button */}
          {done ? (
            <button style={{
              background:'#0c2218', color:'#22c55e',
              border:'1px solid #174030', borderRadius:12,
              padding:'11px 0', fontSize:14, fontWeight:700,
              width:124, cursor:'default',
            }}>
              Done ✓
            </button>
          ) : (
            <button
              onClick={running ? pause : startTimer}
              style={{
                background: running ? '#141428' : '#4f46e5',
                color:      running ? '#5555aa' : '#fff',
                border:     running ? '1px solid #22224a' : 'none',
                borderRadius:12, padding:'11px 0',
                fontSize:14, fontWeight:700,
                width:124, cursor:'pointer',
                transition:'background 0.2s, color 0.2s',
              }}
            >
              {running ? 'Pause' : lapSec > 0 ? 'Resume' : 'Start'}
            </button>
          )}

          {/* reset */}
          <button
            onClick={reset}
            style={{
              background:'#0e0e1e', color:'#44445a',
              border:'1px solid #181830', borderRadius:12,
              padding:'9px 0', fontSize:13, fontWeight:500,
              width:124, cursor:'pointer',
            }}
          >
            Reset
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── PresetTile ───────────────────────────────────────── */
function PresetTile({ preset, count, maxCount, onSelect, featured }) {
  const barW = maxCount > 0 ? (count / maxCount) * 100 : 0;
  const [hover, setHover] = useState(false);
  return (
    <button
      onClick={() => onSelect(preset)}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: featured ? '#16162a' : hover ? '#141428' : '#0e0e1e',
        border: `1px solid ${featured
          ? (hover ? '#4a4a80' : '#28284e')
          : (hover ? '#22224a' : '#141428')}`,
        borderRadius:11,
        padding: featured ? '14px 16px' : '13px 10px',
        cursor:'pointer', position:'relative', overflow:'hidden',
        textAlign:'left', width:'100%',
        transition:'background 0.15s, border-color 0.15s',
      }}
    >
      <div style={{ fontSize: featured ? 20 : 17, fontWeight:700, color:'#cccce8', letterSpacing:-0.3 }}>
        {preset.label}
      </div>
      {featured && (
        <div style={{ fontSize:11, color:'#38385a', marginTop:3 }}>× {count}</div>
      )}
      {!featured && (
        <div style={{
          position:'absolute', bottom:0, left:0, height:2,
          width:`${barW}%`,
          background:'linear-gradient(to right, #4f46e5, #818cf8)',
          transition:'width 0.45s ease',
        }}/>
      )}
    </button>
  );
}

/* ─── PresetPicker ─────────────────────────────────────── */
function PresetPicker({ usage, onSelect }) {
  const [mm, setMm] = useState('');
  const [ss, setSs] = useState('');

  const maxCount = useMemo(
    () => Math.max(...PRESETS.map(p => usage[p.key] || 0), 1),
    [usage]
  );

  const mostUsed = useMemo(
    () => [...PRESETS]
      .filter(p => (usage[p.key] || 0) > 0)
      .sort((a,b) => (usage[b.key]||0) - (usage[a.key]||0))
      .slice(0, 3),
    [usage]
  );

  const goCustom = () => {
    const m = parseInt(mm, 10) || 0;
    const s = parseInt(ss, 10) || 0;
    const total = m * 60 + s;
    if (total > 0) onSelect({ key:'custom', label:`${pad2(m)}:${pad2(s)}`, seconds:total });
  };

  return (
    <div style={{ background:'#0b0b12', minHeight:'100vh', padding:'48px 28px 48px' }}>
      <div style={{ maxWidth:480, margin:'0 auto' }}>

        {/* header */}
        <div style={{ marginBottom:36 }}>
          <h1 style={{ fontSize:40, fontWeight:800, color:'#e0e0f2', letterSpacing:-1.8, lineHeight:1.1 }}>
            How long?
          </h1>
          <p style={{ fontSize:13, color:'#28284a', marginTop:8, letterSpacing:0.8 }}>
            tap to start
          </p>
        </div>

        {/* most used — hidden until at least one preset used */}
        {mostUsed.length > 0 && (
          <div style={{ marginBottom:28 }}>
            <div style={{ fontSize:10, color:'#28284a', textTransform:'uppercase', letterSpacing:2.5, marginBottom:10 }}>
              Most used
            </div>
            <div style={{ display:'flex', gap:10 }}>
              {mostUsed.map(p => (
                <div key={p.key} style={{ flex:1 }}>
                  <PresetTile preset={p} count={usage[p.key]||0} maxCount={maxCount} onSelect={onSelect} featured />
                </div>
              ))}
            </div>
          </div>
        )}

        {/* preset grid */}
        <div style={{
          display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:9,
          marginBottom:28,
        }}>
          {PRESETS.map(p => (
            <PresetTile
              key={p.key} preset={p}
              count={usage[p.key]||0} maxCount={maxCount}
              onSelect={onSelect}
            />
          ))}
        </div>

        {/* custom mm:ss input */}
        <div style={{
          display:'flex', alignItems:'center', gap:8,
          background:'#0e0e1e', border:'1px solid #181830', borderRadius:14,
          padding:'10px 14px',
        }}>
          <input
            type="number" min="0" max="99"
            value={mm} onChange={e => setMm(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && goCustom()}
            placeholder="mm"
            style={{
              width:50, background:'none', border:'none',
              color:'#d0d0e8', fontSize:20, fontWeight:600,
              textAlign:'center', outline:'none',
              fontVariantNumeric:'tabular-nums',
            }}
          />
          <span style={{ color:'#22224a', fontSize:22, fontWeight:200, lineHeight:1 }}>:</span>
          <input
            type="number" min="0" max="59"
            value={ss} onChange={e => setSs(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && goCustom()}
            placeholder="ss"
            style={{
              width:50, background:'none', border:'none',
              color:'#d0d0e8', fontSize:20, fontWeight:600,
              textAlign:'center', outline:'none',
              fontVariantNumeric:'tabular-nums',
            }}
          />
          <button
            onClick={goCustom}
            style={{
              marginLeft:'auto', background:'#4f46e5', color:'#fff',
              border:'none', borderRadius:10, padding:'8px 20px',
              fontSize:13, fontWeight:600, cursor:'pointer',
              display:'flex', alignItems:'center', gap:5,
            }}
          >
            → Go
          </button>
        </div>

      </div>
    </div>
  );
}

/* ─── App ──────────────────────────────────────────────── */
function App() {
  const [screen,  setScreen]  = useState('picker');
  const [usage,   setUsage]   = useState({});
  const [preset,  setPreset]  = useState(null);
  const [session, setSession] = useState(0);

  const select = useCallback(p => {
    setUsage(prev => ({ ...prev, [p.key]: (prev[p.key] || 0) + 1 }));
    setPreset(p);
    setSession(n => n + 1);
    setScreen('timer');
  }, []);

  const back = useCallback(() => setScreen('picker'), []);

  return (
    <div className="viewport">
      <div className={`slides${screen === 'timer' ? ' show-timer' : ''}`}>
        <div className="slide">
          <PresetPicker usage={usage} onSelect={select} />
        </div>
        <div className="slide">
          {preset && <TimerScreen key={session} preset={preset} onBack={back} />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
